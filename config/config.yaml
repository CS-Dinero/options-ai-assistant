app:
  name: Options AI Assistant
  strategy_engine: EM-Gamma Premium Engine v1.0
  symbols:
  - SPY
  - QQQ
filters:
  credit_score_threshold: 75
  calendar_score_threshold: 72
  diagonal_score_threshold: 65
  double_diagonal_threshold: 68
  min_credit: 0.2
  min_debit: 0.1
credit_spreads:
  short_delta_min: 0.15
  short_delta_max: 0.2
  width_min: 3
  width_max: 10
  take_profit_pct_of_credit: 0.5
  stop_multiple_of_credit: 2.0
  exit_dte: 5
calendar:
  short_dte_min: 7
  short_dte_max: 10
  long_dte_min: 45
  long_dte_max: 60
  long_exit_dte: 35
  iv_crush_threshold: -0.15
diagonal:
  long_delta_min: 0.7
  long_delta_max: 0.85
  short_delta_min: 0.2
  short_delta_max: 0.35
  max_debit_pct_of_width: 0.95
  max_long_extrinsic_ratio: 0.4
calendar_diagonal:
  short_dte_min: 7
  short_dte_max: 10
  long_dte_min: 45
  long_dte_max: 60
  long_exit_dte_high: 35
  long_exit_dte_low: 28
  convert_em_frac_low: 0.35
  convert_em_frac_high: 1.0
  short_roll_dte: 5
  diagonal_roll_dte: 5
  target_profit_pct: 0.2
  stop_loss_pct: 0.25
risk:
  account_size: 200000
  max_risk_per_side_pct: 0.005
  max_total_symbol_pct: 0.02
  preferred_risk_dollars: 500
  max_total_portfolio_risk_pct: 0.03
  max_symbol_risk_pct: 0.02
  max_trade_risk_pct: 0.01
  max_symbols: 3
  max_trades_per_symbol: 2
  allow_both_sides_same_symbol: true
  reserve_for_calendars_pct: 0.25
  calendar_min_score_gate: 78.0
  allocation_min_trade_score: 75.0
environment:
  credit_spreads:
    required_gamma_regimes:
    - positive
    required_iv_regimes:
    - elevated
    - rich
    required_em_atr_ratio_min: 2.5
  calendars:
    required_gamma_regimes:
    - positive
    required_iv_regimes:
    - elevated
    - moderate
    required_term_structures:
    - flat
    - contango
  diagonals:
    required_vga_environments:
    - neutral_time_spreads
    - premium_selling
    - mixed
scoring:
  iv_regime: 20
  gamma_regime: 20
  em_placement: 20
  skew: 15
  term_structure: 15
  atr_regime: 10
